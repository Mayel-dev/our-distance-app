<div class="auth-container">
  <div class="auth-card">
    <h2 class="auth-title">Recuperar contrasena</h2>
    <p class="auth-desc">Ingresa tu correo y te guiaremos al siguiente paso.</p>

    <input
      class="auth-input"
      name="email"
      type="email"
      placeholder="Correo electronico"
      [(ngModel)]="email"
      (keyup.enter)="submit()"
    />

    <button class="btn-primary" (click)="submit()">Continuar</button>

    @if (message) {
      <p class="auth-message">{{ message }}</p>
    }

    @if (errorMessage) {
      <p class="auth-error">{{ errorMessage }}</p>
    }

    <a class="auth-link" routerLink="/login">Volver a iniciar sesion</a>
  </div>
</div>
