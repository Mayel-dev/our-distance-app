<div class="auth-container">
  <div class="auth-card">
    <h2 class="auth-title">Crear cuenta</h2>
    <p class="auth-desc">Únete a Our Distance y comparte tus metas con tu pareja.</p>

    <input
      class="auth-input"
      name="username"
      type="text"
      placeholder="Nombre de usuario"
      [(ngModel)]="username"
    />

    <input
      class="auth-input"
      name="email"
      type="email"
      placeholder="Correo electrónico"
      [(ngModel)]="email"
    />

    <input
      class="auth-input"
      name="password"
      type="password"
      placeholder="Contraseña"
      [(ngModel)]="password"
      (keyup.enter)="register()"
    />

    <button class="btn-register" (click)="register()">Crear cuenta</button>

    <a class="auth-link" routerLink="/login">¿Ya tienes cuenta? Inicia sesión</a>
  </div>
</div>
