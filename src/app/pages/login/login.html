<div class="login-page">
  <div class="login-card">
    <h2 class="form-title">Iniciar sesion</h2>
    <p class="login-desc">Accede a tu cuenta y sincroniza metas con tu pareja</p>

    <input class="login-input" type="email" placeholder="Email" [(ngModel)]="email" />

    <input class="login-input" type="password" placeholder="Contrasena" [(ngModel)]="password" />

    <button class="btn-enter" (click)="login()">Entrar</button>

    <a class="forgot-link" routerLink="/forgot-password">Olvide mi contrasena</a>
    <a class="signup-link" routerLink="/register">No tienes cuenta? Registrate</a>
  </div>
</div>
