<app-navbar></app-navbar>

<div class="page-content goals-container">
  <div class="tabs">
    <button class="tab" [class.active]="activeTab === 'my'" (click)="setTab('my')">
      Mis metas
    </button>

    <button class="tab" [class.active]="activeTab === 'partner'" (click)="setTab('partner')">
      Metas de mi pareja
    </button>

    <button class="tab" [class.active]="activeTab === 'shared'" (click)="setTab('shared')">
      Metas compartidas
    </button>
  </div>

  @if (activeTab === 'my' || activeTab === 'shared') {
    <button class="new-goal-btn" (click)="openCreateForm()">+ Nueva meta</button>
  }

  @if (showForm) {
    <goal-form
      [hasPartner]="hasPartner"
      [isEditing]="editingGoal !== null"
      [goal]="editingGoal"
      (formClosed)="showForm = false; editingGoal = null"
      (goalSaved)="onGoalSaved()"
      [currentUserId]="currentUserId"
    ></goal-form>
  }

  @if (loading) {
    <p>Cargando metas...</p>
  } @else if (activeTab !== 'my' && !hasPartner) {
    <div class="no-partner">
      <p>Aún no tienes pareja conectada 💔</p>
      <a routerLink="/pairing">Conectar pareja</a>
    </div>
  } @else {
    @for (goal of goals; track goal.id) {
      <app-goal-card
        [goal]="goal"
        (goalDeleted)="onGoalSaved()"
        (goalEdited)="onEditGoal($event)"
        [currentUserId]="currentUserId"
      ></app-goal-card>
    } @empty {
      <p>Aún no hay metas aquí 🎯</p>
    }
  }
</div>
