<div class="auth-container">
  <div class="auth-card">
    <h2 class="auth-title">Restablecer contrasena</h2>
    <p class="auth-desc">Pega el token recibido y define una nueva contrasena.</p>

    <textarea
      class="auth-textarea"
      name="token"
      placeholder="Token de recuperacion"
      [(ngModel)]="token"
    ></textarea>

    <input
      class="auth-input"
      name="newPassword"
      type="password"
      placeholder="Nueva contrasena"
      [(ngModel)]="newPassword"
    />

    <input
      class="auth-input"
      name="confirmPassword"
      type="password"
      placeholder="Confirmar nueva contrasena"
      [(ngModel)]="confirmPassword"
      (keyup.enter)="submit()"
    />

    <button class="btn-primary" (click)="submit()">Guardar contrasena</button>

    @if (message) {
      <p class="auth-message">{{ message }}</p>
      <a class="auth-link" routerLink="/login">Ir a iniciar sesion</a>
    }

    @if (errorMessage) {
      <p class="auth-error">{{ errorMessage }}</p>
    }
  </div>
</div>
