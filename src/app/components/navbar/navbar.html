<nav class="navbar">
  <!-- Desktop logo -->
  <a class="logo" routerLink="/home">
    <span class="brand-mark">♥</span>
    <span class="brand-text">Our Distance</span>
  </a>

  <!-- Desktop nav links -->
  <div class="nav-links desktop-nav">
    @for (link of navLinks; track link.route) {
      <a [routerLink]="link.route">{{ link.label }}</a>
    }
  </div>

  <div class="nav-actions desktop-nav">
    <button class="logout-btn" (click)="logout()">Cerrar sesión</button>
  </div>

  <!-- Mobile bottom nav -->
  <div class="bottom-nav">
    @for (link of navLinks; track link.route) {
      <a [routerLink]="link.route" routerLinkActive="active">
        <span class="nav-icon">{{ link.icon }}</span>
        <span class="nav-label">{{ link.label }}</span>
      </a>
    }
    <button class="logout-bottom" (click)="logout()">
      <span class="nav-icon">🚪</span>
      <span class="nav-label">Salir</span>
    </button>
  </div>
</nav>
